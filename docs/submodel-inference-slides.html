<p>The central object of Bayesian inference is the <strong>posterior distribution</strong> <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="10.246ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 4528.6 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45D" d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z"></path></g><g data-mml-node="mo" transform="translate(503,0)"><path data-c="28" d="M94 250Q94 319 104 381T127 488T164 576T202 643T244 695T277 729T302 750H315H319Q333 750 333 741Q333 738 316 720T275 667T226 581T184 443T167 250T184 58T225 -81T274 -167T316 -220T333 -241Q333 -250 318 -250H315H302L274 -226Q180 -141 137 -14T94 250Z"></path></g><g data-mml-node="mi" transform="translate(892,0)"><path data-c="1D703" d="M35 200Q35 302 74 415T180 610T319 704Q320 704 327 704T339 705Q393 701 423 656Q462 596 462 495Q462 380 417 261T302 66T168 -10H161Q125 -10 99 10T60 63T41 130T35 200ZM383 566Q383 668 330 668Q294 668 260 623T204 521T170 421T157 371Q206 370 254 370L351 371Q352 372 359 404T375 484T383 566ZM113 132Q113 26 166 26Q181 26 198 36T239 74T287 161T335 307L340 324H145Q145 321 136 286T120 208T113 132Z"> <p>When you have a posterior, everything else follows:</p>
<ul>
<li><strong>Point estimates</strong> — summaries of the posterior (median, MAP)</li>
<li><strong>Uncertainty</strong> — posterior spread, no arbitrary ranges needed</li>
<li><strong>Virtual populations</strong> — draw directly from the joint posterior</li>
<li><strong>Predictions</strong> — propagate the posterior forward through the model</li>
</ul>
<p>The posterior is not just a nice-to-have — it's what makes calibration <em>reproducible</em> and <em>composable</em></p>

<h1 id="what-goes-wrong-without-one">What Goes Wrong Without One</h1>
<p>There's nothing wrong with using different methods for different parameters — fitting to time-course data, setting values from literature, estimating from in vitro assays</p>
<p>The problem is when the <em>probabilistic structure</em> is never made explicit:</p>
<ul>
<li>What distribution are you assuming for each parameter?</li>
<li>How does each data source connect to which parameters?</li>
<li>What uncertainty propagates from where?</li>
</ul>
<p>Without a clear DAG of priors <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> likelihoods <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> posteriors, the &quot;calibrated&quot; parameter set has no coherent interpretation, and uncertainty estimates become <em>artifacts of arbitrary choices</em></p>

<h1 id="two-stage-calibration">Two-Stage Calibration</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  Stage 1 — submodel priors              Stage 2 — full model calibration
  ┌────────────────────────────┐          ┌──────────────────────────┐
  │                            │          │                          │
  │  Literature data           │          │  Informative priors      │
  │  (in vitro, preclinical)   │          │  (from Stage 1)          │
  │  + self-contained forward  │          │  + clinical data         │
  │    models                  │ ──────&gt;  │  + full QSP simulator    │
  │           ↓                │          │           ↓              │
  │  Joint MCMC (NumPyro)      │          │  SBI (SNPE-C)            │
  │           ↓                │          │           ↓              │
  │  Marginals + copula        │          │  Final posterior         │
  └────────────────────────────┘          └──────────────────────────┘
</code></pre>
<ul>
<li><strong>Stage 1</strong> uses <strong>SubmodelTargets</strong> — self-contained forward models, differentiable, NUTS MCMC</li>
<li><strong>Stage 2</strong> uses <strong>CalibrationTargets</strong> — clinical observables requiring the full simulator, simulation-based inference</li>
</ul>
<p>This talk covers Stage 1.</p>
</section>

<h1 id="what-is-a-submodeltarget">What Is a SubmodelTarget?</h1>
<p>A structured extraction from one paper connecting a literature measurement to model parameters</p>
<div class="cols">
<div>
<h3 id="components">Components</h3>
<ul>
<li><strong>Inputs</strong> — extracted values with full source provenance</li>
<li><strong>Forward model</strong> — self-contained math: params <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> observable</li>
<li><strong>Error model</strong> — bootstrap from reported statistics</li>
<li><strong>Source relevance</strong> — how well the context translates</li>
</ul>
</div>
<div>
<h3 id="key-property">Key property</h3>
<p>Each target is a <em>standalone inference problem</em> — no full QSP simulation needed</p>
<p>The forward model is a submodel: a small piece of the QSP model that can be evaluated cheaply and differentiated for NUTS</p>

<ol>
<li>Run <code>derive_observation</code> 10,000 times <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> bootstrap distribution of the observable</li>

<h1 id="component-decomposition">Component Decomposition</h1>
<p>The DAG of parameters <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2194" d="M263 479Q267 501 271 506T288 511Q308 511 308 500Q308 493 303 475Q293 438 278 406T246 352T215 315T185 287T165 270H835Q729 349 696 475Q691 493 691 500Q691 511 711 511Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H165Q167 228 182 216T211 189T244 152T277 96T303 25Q308 7 308 0Q308 -11 288 -11Q281 -11 278 -11T272 -7T267 2T263 21Q245 94 195 151T73 236Q58 242 55 247Q55 254 59 257T73 264Q144 292 194 349T263 479Z"></path></g></g></g></svg></mjx-container> targets is usually <em>sparse</em></p>
<ul>
<li>A T cell trafficking rate and a drug clearance rate don't share any data</li>
<li>The pipeline automatically finds connected components and runs MCMC on each independently</li>
<li>Components are small (1-10 parameters) <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> exact MCMC, no approximations</li>
</ul>
<p>Per-component posteriors are recombined into a joint posterior:</p>
<ul>
<li><strong>Marginals</strong> — best-AIC fit per parameter (lognormal, gamma, ...)</li>
<li><strong>Gaussian copula</strong> — captures within-component correlations</li>
<li>Cross-component correlations are zero by construction</li>
</ul>

<h1 id="cascade-cuts">Cascade Cuts</h1>
<p>When shared parameters pull many targets into one large joint component, fitting can struggle — the forward models are <em>approximations</em>, and conflicting data can bias the posterior</p>
<p><strong>Cascade cuts</strong> split the joint into stages:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Stage 0: Immune cell densities (from IHC data)
    ↓ posteriors become priors
Stage 1: Cytokine concentrations (depend on cell densities)
</code></pre>
<p>This is a <strong>bias/variance tradeoff</strong>: cutting removes cross-stage information flow (data can't &quot;talk back&quot; to upstream parameters), but prevents conflicting submodels from biasing each other</p>
<p>Whether the tradeoff is worth it depends on the DAG — try it when joint fitting produces suspicious results</p>
</section>

<h1 id="posterior-predictive-checks">Posterior Predictive Checks</h1>
<p>&quot;If the posterior is correct, can it reproduce the data?&quot;</p>
<p>For each observable:</p>
<ul>
<li><strong>Prior predictive</strong> — model predictions under the prior</li>
<li><strong>Observed</strong> — bootstrap median from the paper</li>
<li><strong>Posterior predictive</strong> — model predictions under the posterior</li>
</ul>
<p>Observed should fall within the 95% CI of the posterior predictive</p>
<p>If not: forward model misspecification, underestimated uncertainty, or translation sigma doing its job (loose fit for low-relevance sources)</p>

<h1 id="comparison">Comparison</h1>
<table>
<thead>
<tr>
<th></th>
<th>Ad hoc calibration</th>
<th>Submodel inference</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Central object</strong></td>
<td>Point estimates + arbitrary ranges</td>
<td>Joint posterior</td>
</tr>
<tr>
<td><strong>Priors</strong></td>
<td>Implicit or absent</td>
<td>Explicit, updatable</td>
</tr>
<tr>
<td><strong>Uncertainty</strong></td>
<td>Artifact of chosen range</td>
<td>Consequence of data</td>
</tr>
<tr>
<td><strong>Data weighting</strong></td>
<td>Equal or manual</td>
<td>Translation sigma</td>
</tr>
<tr>
<td><strong>Correlations</strong></td>
<td>Not captured</td>
<td>Gaussian copula</td>
</tr>
<tr>
<td><strong>Diagnostics</strong></td>
<td>Visual fit</td>
<td>Contraction, PPC, convergence</td>
</tr>
</tbody>
</table>
<p>The approaches are complementary — the submodel posterior is a well-informed <em>starting point</em> for full-model calibration, not a replacement for it</p>
</section>

<h1 id="getting-started">Getting Started</h1>

</ol>

qsp-audit -r . dag -o figs   <span class="hljs-comment"># visualize the inference DAG</span>
</code></pre>
